# ---------------------------------------------------------------------------
# Default framework configuration.
#
# Every value can be overridden at runtime with a system property of the same
# name, e.g.  mvn clean test -Dbrowser=firefox -Dheadless=false
# ---------------------------------------------------------------------------

# Application under test
baseUrl=https://www.saucedemo.com

# Browser: chrome | firefox | edge
browser=chrome

# Run the browser without a visible UI (recommended for CI)
headless=true

# Maximize the window on start (ignored in headless mode)
maximize=true

# Explicit-wait timeout (seconds) used by all waits / page synchronisation
explicitWaitSeconds=15

# Implicit fallback timeout (seconds). Kept low; explicit waits are preferred.
implicitWaitSeconds=0

# Page-load timeout (seconds)
pageLoadTimeoutSeconds=30

# ---------------------------------------------------------------------------
# Test data (SauceDemo publishes these credentials on its login page)
# ---------------------------------------------------------------------------
standardUser=standard_user
lockedOutUser=locked_out_user
problemUser=problem_user
performanceGlitchUser=performance_glitch_user
password=secret_sauce

# Optional: absolute path to a browser binary (leave blank to auto-detect).
# Useful in sandboxed environments. Can also be set via CHROME_BIN env var.
browserBinary=

# Optional: pin the browser major version so WebDriverManager fetches a matching
# driver. Leave blank to let WebDriverManager auto-detect the installed browser.
browserVersion=
